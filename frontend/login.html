<html>
    <head>
        <title>University Portal-Login</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="login.css">
    </head>
    <body>
        <div class="split-layout">

            <!-- LEFT: Brand Panel -->
            <div class="brand-panel">
                <div class="brand-content">
                    <div class="brand-logo">AU</div>
                    <h1 class="brand-name">Alliance<br><span>University</span></h1>
                    <div class="divider-line"></div>
                    <p class="brand-tagline">Your academic journey — grades, records, and more, all in one place.</p>
                </div>
                <div class="geo geo-1"></div>
                <div class="geo geo-2"></div>
                <div class="geo geo-3"></div>
                <div class="geo geo-4"></div>
            </div>

            <!-- RIGHT: Form Panel -->
            <div class="form-panel">
                <div class="form-wrapper">
                    <p class="form-eyebrow">Student Portal</p>
                    <h2>Welcome back.</h2>
                    <p class="form-sub">Sign in to continue to your account.</p>

                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="you@university.edu" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button class="btn">Log In →</button>
                    </form>

                    <p class="text-center">New to the portal? <a href="signup.html">Create an account</a></p>
                </div>
            </div>

        </div>
        <script src="js/auth.js"></script>
    </body>
</html>
